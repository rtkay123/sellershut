[workspace]
members = ["crates/*", "examples/*"]
default-members = ["crates/*"]
resolver = "2"

[workspace.dependencies]
anyhow = "1.0.86"
async-graphql = "7.0.6"
async-graphql-axum = "7.0.6"
axum = "0.7.5"
dotenvy = "0.15.7"
prost = "0.12.6"
sellershut-core = { path = "crates/sellershut-core" }
sellershut-services = { path = "crates/services" }
serde = "1.0.203"
serde_json = "1.0.118"
sqlx = { version = "0.7.4", default-features = false }
tokio = "1.38.0"
tonic = "0.11.0"
tonic-build = "0.11.0"
tonic-types = "0.11.0"
tracing = "0.1.40"
