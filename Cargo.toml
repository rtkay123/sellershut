[workspace]
members = ["crates/*", "examples/*"]
default-members = ["crates/*"]
resolver = "2"

[workspace.dependencies]
anyhow = "1.0.86"
async-graphql = { version = "7.0.6", default-features = false }
async-graphql-axum = "7.0.6"
axum = "0.7.5"
dotenvy = "0.15.7"
fake = "2.9.2"
futures-util = "0.3.30"
prost = "0.13.0"
sellershut-core = { path = "crates/sellershut-core" }
sellershut-services = { path = "crates/services" }
serde = "1.0.203"
serde_json = "1.0.118"
sqlx = { version = "0.7.4", default-features = false }
tokio = "1.38.0"
tonic = "0.12.0"
tonic-build = "0.12.0"
tonic-types = "0.12.0"
tower = "0.4.13"
tracing = "0.1.40"
