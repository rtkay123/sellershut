[package]
name = "sellershut-core"
version = "0.1.0"
edition = "2021"
license = "MIT OR Apache-2.0"

[dependencies]
prost = { version = "0.12.6", optional = true }
serde = { version = "1.0.203", optional = true }
tonic = { version = "0.11.0", optional = true }
tonic-types = { version = "0.11.0", optional = true }

[features]
default = []
categories = ["tonic"]
rpc-client-categories = ["categories", "dep:tonic-types"]
rpc-server-categories = ["categories", "dep:tonic-types"]
rpc-categories-full = ["rpc-client-categories", "rpc-server-categories"]
serde = ["dep:serde", "serde/derive"]
tonic = ["dep:tonic", "dep:prost"]

[build-dependencies]
tonic-build = "0.11.0"

[dev-dependencies]
serde_json = "1.0.118"
tokio = { version = "1.38.0", features = ["macros", "rt-multi-thread"] }

[[example]]
name = "grpc-server"
path = "examples/grpc/server.rs"
required-features = ["rpc-server-categories"]

[[example]]
name = "grpc-client"
path = "examples/grpc/client.rs"
required-features = ["rpc-client-categories"]

[[example]]
name = "serde"
path = "examples/serde.rs"
required-features = ["categories", "serde"]
