[package]
name = "sellershut-api-categories"
version = "0.1.0"
edition = "2021"

[dependencies]
anyhow.workspace = true
axum = { workspace = true, features = ["macros", "http2", "ws"] }
async-graphql.workspace = true
async-graphql-axum.workspace = true
dotenvy.workspace = true
sellershut-core = { workspace = true, features = ["rpc-client-categories", "rpc-server-categories", "serde", "sqlx"] }
sellershut-services = { workspace = true, features = ["telemetry"] }
serde = { workspace = true, features = ["derive"] }
serde_json.workspace = true
sqlx = { workspace = true, features = ["migrate", "postgres", "runtime-tokio", "tls-rustls"] }
tokio = { workspace = true, features = ["macros", "rt-multi-thread"] }
tonic.workspace = true
tracing.workspace = true
