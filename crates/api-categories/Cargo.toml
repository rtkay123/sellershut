[package]
name = "sellershut-api-categories"
version = "0.1.0"
edition = "2021"

[dependencies]
anyhow.workspace = true
axum = { workspace = true, features = ["macros", "http2", "ws"] }
sellershut-core = { workspace = true, features = ["rpc-client-categories", "rpc-server-categories", "serde", "sqlx"] }
sellershut-services = { workspace = true, features = ["telemetry"] }
sqlx = { workspace = true, features = ["migrate", "postgres", "runtime-tokio", "tls-rustls"] }
tokio = { workspace = true, features = ["macros", "rt-multi-thread"] }
tracing.workspace = true
